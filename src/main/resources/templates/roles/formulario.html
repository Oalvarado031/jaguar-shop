<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Formulario Rol</title>
</head>

<body>

<section layout:fragment="contenido">

    <div class="card bg-secondary text-light shadow">

        <div class="card-header">
            <h3 th:text="${rol.id == null ? 'Nuevo Rol' : 'Editar Rol'}"></h3>
        </div>

        <div class="card-body">

            <form method="post"
                  th:action="${rol.id == null} ?
                  @{/roles/guardar} :
                  @{/roles/actualizar/{id}(id=${rol.id})}"
                  th:object="${rol}">

                <div class="mb-3">

                    <label class="form-label">
                        Nombre del Rol
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="ROLE_ADMIN">

                    <div class="text-warning"
                         th:errors="*{nombre}">
                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descripción
                    </label>

                    <textarea class="form-control"
                              rows="3"
                              th:field="*{descripcion}">
                    </textarea>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Guardar
                </button>

                <a th:href="@{/roles}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</section>

</body>
</html>

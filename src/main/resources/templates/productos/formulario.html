<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title th:text="${producto.id == null ? 'Nuevo producto' : 'Editar producto'}">Producto</title>
</head>

<body>

<section layout:fragment="contenido" class="js-fade">

    <div class="js-sec" style="max-width:760px;padding-top:40px;padding-bottom:70px;">

        <div class="js-crumbs">
            <span class="teal">Panel admin</span><span>/</span>
            <a th:href="@{/productos}">Productos</a><span>/</span>
            <span class="now" th:text="${producto.id == null ? 'Nuevo' : 'Editar'}">Nuevo</span>
        </div>

        <h1 class="js-pagetitle" th:text="${producto.id == null ? 'Nuevo producto' : 'Editar producto'}">Nuevo producto</h1>

        <div class="js-panel">
            <form method="post"
                  enctype="multipart/form-data"
                  th:action="${producto.id == null} ? @{/productos/guardar} : @{/productos/actualizar/{id}(id=${producto.id})}"
                  th:object="${producto}">

                <div class="js-field">
                    <label class="js-flabel" for="nombre">Nombre</label>
                    <input type="text" class="js-input" th:field="*{nombre}" id="nombre" placeholder="Ej. Camiseta UAM Jaguar">
                    <div class="js-err" th:errors="*{nombre}"></div>
                </div>

                <div class="js-field">
                    <label class="js-flabel" for="descripcion">Descripción</label>
                    <textarea class="js-textarea" rows="3" th:field="*{descripcion}" id="descripcion" placeholder="Detalles del producto, materiales, tallas…"></textarea>
                </div>

                <div class="js-grid2">
                    <div class="js-field">
                        <label class="js-flabel" for="precio">Precio (C$)</label>
                        <input type="number" step="0.01" class="js-input" th:field="*{precio}" id="precio" placeholder="350">
                        <div class="js-err" th:errors="*{precio}"></div>
                    </div>
                    <div class="js-field">
                        <label class="js-flabel" for="stock">Stock</label>
                        <input type="number" class="js-input" th:field="*{stock}" id="stock" placeholder="40">
                        <div class="js-err" th:errors="*{stock}"></div>
                    </div>
                </div>

                <div class="js-field">
                    <label class="js-flabel" for="categoria">Categoría</label>
                    <select class="js-select" th:field="*{categoria.id}" id="categoria">
                        <option value="">Seleccione una categoría</option>
                        <option th:each="categoria : ${categorias}"
                                th:value="${categoria.id}"
                                th:text="${categoria.nombre}"></option>
                    </select>
                </div>

                <div class="js-field">
                    <label class="js-flabel" for="archivoImagen">Imagen</label>
                    <label class="js-dropzone" for="archivoImagen">
                        <span class="js-dropzone__icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"></path><path d="m7 9 5-5 5 5"></path><path d="M5 20h14"></path></svg>
                        </span>
                        <span style="font-weight:600;font-size:14px;display:block;">Hacé clic para subir una imagen</span>
                        <span style="font-size:12.5px;color:var(--muted);display:block;margin-top:5px;">JPG o PNG · máx 5MB</span>
                    </label>
                    <input type="file" class="js-input" id="archivoImagen" name="archivoImagen" accept="image/*" style="margin-top:10px;">
                </div>

                <div style="display:flex;gap:12px;margin-top:8px;">
                    <button type="submit" class="js-btn js-btn--primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 6"></path></svg>
                        Guardar producto
                    </button>
                    <a th:href="@{/productos}" class="js-btn js-btn--ghost">Cancelar</a>
                </div>

            </form>
        </div>

    </div>

</section>

</body>
</html>

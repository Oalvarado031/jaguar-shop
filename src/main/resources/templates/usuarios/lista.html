<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Usuarios</title>
</head>

<body>

<section layout:fragment="contenido">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gestión de Usuarios</h1>

        <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">
            Nuevo Usuario
        </a>
    </div>

    <div class="card bg-secondary text-light shadow">
        <div class="card-body">

            <table class="table table-dark table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Estado</th>
                    <th>Roles</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.nombre}"></td>
                    <td th:text="${usuario.correo}"></td>

                    <td>
                        <span th:if="${usuario.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${usuario.activo}" class="badge bg-danger">Inactivo</span>
                    </td>

                    <td>
                        <span th:each="rol : ${usuario.roles}"
                              class="badge bg-info text-dark me-1"
                              th:text="${rol.nombre}">
                        </span>
                    </td>

                    <td class="text-end">
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/usuarios/estado/{id}(id=${usuario.id})}"
                           class="btn btn-info btn-sm">
                            Activar/Desactivar
                        </a>

                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desea eliminar este usuario?')">
                            Eliminar
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="6" class="text-center">
                        No hay usuarios registrados.
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title th:text="${usuario.id == null ? 'Nuevo usuario' : 'Editar usuario'}">
        Usuario
    </title>
</head>

<body>

<section layout:fragment="contenido">

    <div class="card bg-secondary text-light shadow">
        <div class="card-header">
            <h3 th:text="${usuario.id == null ? 'Nuevo Usuario' : 'Editar Usuario'}"></h3>
        </div>

        <div class="card-body">

            <form method="post"
                  th:action="${usuario.id == null} ? @{/usuarios/guardar} : @{/usuarios/actualizar/{id}(id=${usuario.id})}"
                  th:object="${usuario}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="Nombre completo">

                    <div class="text-warning" th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email"
                           class="form-control"
                           th:field="*{correo}"
                           placeholder="correo@ejemplo.com">

                    <div class="text-warning" th:errors="*{correo}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{password}"
                           th:placeholder="${usuario.id == null ? 'Contraseña' : 'Dejar vacío para mantener la actual'}">

                    <div class="text-warning" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>

                    <select class="form-select" th:field="*{activo}">
                        <option th:value="true">Activo</option>
                        <option th:value="false">Inactivo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Roles</label>

                    <div class="form-check"
                         th:each="rol : ${roles}">

                        <input class="form-check-input"
                               type="checkbox"
                               th:field="*{roles}"
                               th:value="${rol.id}"
                               th:id="${'rol_' + rol.id}">

                        <label class="form-check-label"
                               th:for="${'rol_' + rol.id}"
                               th:text="${rol.nombre}">
                        </label>

                    </div>
                </div>

                <button type="submit" class="btn btn-success">
                    Guardar
                </button>

                <a th:href="@{/usuarios}" class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>
    </div>

</section>

</body>
</html>

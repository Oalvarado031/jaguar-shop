<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Mis pedidos</title>
</head>

<body>

<section layout:fragment="contenido" class="js-fade">

    <div class="js-sec" style="max-width:980px;padding-top:40px;padding-bottom:70px;">

        <div class="js-sec__head" style="margin-bottom:18px;">
            <div>
                <div class="js-sec__eyebrow">Tu cuenta</div>
                <h1 class="js-display js-sec__title" style="font-size:42px;">Mis pedidos</h1>
            </div>
            <a th:href="@{/productos}" class="js-btn js-btn--ghost" style="font-size:13.5px;padding:10px 18px;">Ir al catálogo</a>
        </div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="js-panel" style="text-align:center;color:var(--muted);">
            Todavía no tenés pedidos. ¡Agregá productos al carrito y finalizá tu compra!
        </div>

        <div th:unless="${#lists.isEmpty(pedidos)}" class="js-panel" style="padding:0;overflow:hidden;">
            <table class="table" style="margin:0;">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Fecha</th>
                    <th class="text-center">Artículos</th>
                    <th>Estado</th>
                    <th class="text-end">Total</th>
                    <th class="text-end">Detalle</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pedidos}">
                    <td class="teal" th:text="'#' + ${p.id}">#0</td>
                    <td th:text="${p.fechaTexto}">fecha</td>
                    <td class="text-center" th:text="${#lists.size(p.detalles)}">0</td>
                    <td>
                        <span class="js-badge-estado" th:classappend="'e-' + ${#strings.toLowerCase(p.estado)}"
                              th:text="${p.estado}">ESTADO</span>
                    </td>
                    <td class="text-end">C$<span th:text="${#numbers.formatInteger(p.total,1,'COMMA')}">0</span></td>
                    <td class="text-end">
                        <a th:href="@{/pedidos/{id}(id=${p.id})}" class="js-link">Ver →</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</section>

</body>
</html>

<!DOCTYPE html>
<html lang="es"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="https://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">

<head>
    <title>Pedido confirmado</title>
</head>

<body>

<section layout:fragment="contenido" class="js-fade">

    <div class="js-sec" style="max-width:820px;padding-top:40px;padding-bottom:70px;">

        <div class="js-panel" style="text-align:center;">
            <div style="font-size:46px;line-height:1;margin-bottom:10px;">✅</div>
            <h1 class="js-pagetitle" style="margin-bottom:6px;">¡Pedido confirmado!</h1>
            <p style="color:var(--muted);margin-bottom:4px;">
                Pedido <strong class="teal">#<span th:text="${pedido.id}">0</span></strong> ·
                <span th:text="${pedido.nombreCliente}">Cliente</span>
            </p>
            <p style="color:var(--muted);font-size:13px;">Retirá tu pedido en la tienda del campus UAM.</p>
        </div>

        <div class="js-panel" style="margin-top:20px;">
            <table class="table" style="margin:0;">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th class="text-center">Cantidad</th>
                    <th class="text-end">Precio</th>
                    <th class="text-end">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${pedido.detalles}">
                    <td th:text="${d.producto.nombre}">Producto</td>
                    <td class="text-center" th:text="${d.cantidad}">1</td>
                    <td class="text-end">C$<span th:text="${#numbers.formatInteger(d.precioUnitario,1,'COMMA')}">0</span></td>
                    <td class="text-end">C$<span th:text="${#numbers.formatInteger(d.subtotal,1,'COMMA')}">0</span></td>
                </tr>
                </tbody>
                <tfoot>
                <tr>
                    <th colspan="3" class="text-end">Total</th>
                    <th class="text-end teal">C$<span th:text="${#numbers.formatInteger(pedido.total,1,'COMMA')}">0</span></th>
                </tr>
                </tfoot>
            </table>
        </div>

        <div style="display:flex;gap:12px;margin-top:22px;">
            <a th:href="@{/productos}" class="js-btn js-btn--primary">Seguir comprando</a>
            <a th:href="@{/pedidos}" class="js-btn js-btn--ghost">Mis pedidos</a>
        </div>

    </div>

</section>

</body>
</html>
